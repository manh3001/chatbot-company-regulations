name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        # Scoped to tests/ on purpose: the repo root has a leftover test_cuda.py
        # GPU probe that imports torch (not a dependency). Do not broaden to bare pytest.
        run: python -m pytest tests/
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run frontend unit tests
        # Quoted glob so Node (not the shell) expands it — portable across
        # bash/PowerShell. Node's --test glob support requires Node >= 21.
        run: node --test "tests/frontend/**/*.test.js"
